<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventChain - Event Ticket DApp</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f8fc;
      --card-bg: #ffffff;
      --primary: #0d6efd;
      --primary-dark: #0b5ed7;
      --secondary: #1e40af;
      --accent: #2563eb;
      --success: #198754;
      --danger: #dc3545;
      --text-dark: #1e3a5f;
      --text-light: #5f6f82;
      --border: #dbeafe;
      --shadow: 0 10px 25px rgba(13, 110, 253, 0.08);
      --radius: 16px;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef5ff, #f8fbff);
      color: var(--text-dark);
      min-height: 100vh;
      line-height: 1.6;
    }

    .navbar {
      background: linear-gradient(135deg, #0d6efd, #1e40af);
      color: white;
      padding: 22px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }

    .brand h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .brand p {
      font-size: 15px;
      color: #dbeafe;
    }

    .wallet-section {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 10px;
    }

    .wallet-address {
      background: rgba(255, 255, 255, 0.18);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }

    .main-container {
      width: 90%;
      max-width: 1200px;
      margin: 30px auto;
    }

    .hero {
      background: linear-gradient(135deg, #ffffff, #eaf3ff);
      border-radius: var(--radius);
      padding: 40px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .hero-text h2 {
      font-size: 32px;
      margin-bottom: 12px;
      color: var(--secondary);
    }

    .hero-text p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 760px;
    }

    .card,
    .create-event-section,
    .events-section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .create-event-section h3,
    .events-section h3 {
      margin-bottom: 20px;
      font-size: 24px;
      color: var(--secondary);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .form-grid input,
    .form-grid textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      background: #f8fbff;
      transition: all 0.3s ease;
      outline: none;
      color: var(--text-dark);
    }

    .form-grid input:focus,
    .form-grid textarea:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.14);
    }

    .form-grid textarea {
      min-height: 120px;
      resize: vertical;
      grid-column: 1 / -1;
    }

    .primary-btn,
    .secondary-btn,
    .buy-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .primary-btn {
      background: linear-gradient(135deg, #0d6efd, #2563eb);
      color: white;
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.22);
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .secondary-btn {
      background: #eef4ff;
      color: var(--primary-dark);
      border: 1px solid #cfe2ff;
    }

    .secondary-btn:hover {
      background: #dbeafe;
    }

    .buy-btn {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      width: 100%;
      margin-top: 10px;
    }

    .buy-btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .status-text {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--success);
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .event-card {
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .event-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(13, 110, 253, 0.12);
    }

    .event-card h4 {
      font-size: 22px;
      margin-bottom: 10px;
      color: var(--secondary);
    }

    .event-meta {
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--text-light);
    }

    .event-meta strong {
      color: var(--text-dark);
    }

    .event-description {
      margin: 14px 0 18px;
      font-size: 15px;
      color: var(--text-dark);
    }

    .event-footer {
      margin-top: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      border: 2px dashed #cbdcf8;
      border-radius: 16px;
      color: var(--text-light);
      background: #f8fbff;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 20px;
        flex-direction: column;
        align-items: flex-start;
      }

      .wallet-section {
        width: 100%;
        justify-content: space-between;
      }

      .hero {
        padding: 24px;
      }

      .hero-text h2 {
        font-size: 24px;
      }

      .main-container {
        width: 94%;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <h1>EventChain</h1>
      <p>Blockchain Event Ticketing Platform</p>
    </div>

    <div class="wallet-section">
      <span id="walletAddress" class="wallet-address">Not Connected</span>
      <button id="connectBtn" class="primary-btn">Connect Wallet</button>
    </div>
  </header>

  <main class="main-container">
    <section class="hero">
      <div class="hero-text">
        <h2>Smart Event Ticketing on Ethereum</h2>
        <p>
          EventChain allows users to connect MetaMask, create blockchain-based events,
          and buy tickets securely through Ethereum smart contracts.
        </p>
      </div>
    </section>

    <section class="create-event-section card">
      <h3>Create New Event</h3>
      <div class="form-grid">
        <input type="text" id="eventName" placeholder="Event Name" />
        <input type="date" id="eventDate" />
        <input type="time" id="eventTime" />
        <input type="text" id="eventPrice" placeholder="Ticket Price in ETH (e.g. 0.01)" />
        <textarea id="eventDescription" placeholder="Event Description"></textarea>
      </div>
      <button id="createEventBtn" class="primary-btn">Create Event</button>
      <p id="createStatus" class="status-text"></p>
    </section>

    <section class="events-section card">
      <div class="section-header">
        <h3>Available Events</h3>
        <button id="refreshBtn" class="secondary-btn">Refresh Events</button>
      </div>
      <div id="eventsContainer" class="events-grid"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  
</body>
</html>
